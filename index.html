<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FileFox — Private Client-Side Media Converter</title>
    <script>
      // Safeguard against third-party libraries trying to overwrite window.fetch
      // where fetch has only a getter in sandboxed iframe environments.
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Safeguard window.fetch patch applied partially or failed:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
